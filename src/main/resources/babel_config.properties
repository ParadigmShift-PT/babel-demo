# === babel-demo configuration ===============================================
# Every value here can be overridden on the command line, e.g.
#   java -jar babel-demo.jar nick=alice babel.port=6000 babel.interface=en0
# ============================================================================

#### Process-wide bind (babel.*) — defaults a protocol's channel uses unless it
#### defines its own namespaced address/interface/port.
# TCP port this node listens on. Run several nodes on one machine by giving each
# a distinct port. (Across different machines the same port is fine.)
babel.port=6000
# Network interface to bind/announce on (e.g. en0 on macOS, eth0 on Linux).
# Required for LAN multicast discovery to advertise a reachable address.
#babel.interface=en0

#### Membership (gossip-based full membership) — params namespaced 'membership.'
# Bootstrap contact for when multicast discovery is unavailable:
#   none         → I am the first node (start immediately, don't wait)
#   host:port    → seed from this existing node
#   (commented)  → wait passively for multicast discovery to provide a contact
membership.contact=none
membership.sampletime 2000
membership.samplesize 6
# Set >0 to periodically log the membership view to the log file (diagnostics).
membership.metrics.interval -1
