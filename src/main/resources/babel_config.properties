# === babel-demo configuration ===============================================
# Every value here can be overridden on the command line, e.g.
#   java -jar babel-demo.jar nick=alice babel.port=6000 babel.interface=en0
# ============================================================================

#### Process-wide bind (babel.*) — defaults a protocol's channel uses unless it
#### defines its own namespaced address/interface/port.
# TCP port this node listens on. Run several nodes on one machine by giving each
# a distinct port. (Across different machines the same port is fine.)
babel.port=6000
# Network interface to bind/announce on (e.g. en0 on macOS, eth0 on Linux). If
# left unset, the first reachable (non-loopback, up) interface is auto-detected.
# Set this only if the machine has several and the wrong one is picked.
#babel.interface=en0
# Bind/announce IP — overrides interface auto-detection. There is NO loopback
# default: if no reachable interface can be auto-detected, you must set this or
# babel.interface. Use 127.0.0.1 to run several nodes on one disconnected machine.
#babel.address=127.0.0.1

#### Discovery — REQUIRED to enable multicast LAN auto-discovery. Without this
#### key babel-core (Babel.start) loads NO discovery protocol, the DiscoverableProtocol
#### is never wired, and nodes connect only via the membership.contact fallback below
#### (there is no error — just a debug log "No Discovery Protocol was requested").
#### List several classes separated by ';'. MulticastDiscoveryProtocol joins group
#### 233.138.122.123 on ports 1025/1026 and reuses babel.interface/babel.address
#### above; override with babel.discovery.multicast.* / babel.discovery.unicast.* keys.
babel.discovery pt.unl.fct.di.novasys.babel.core.protocols.discovery.MulticastDiscoveryProtocol

#### Membership (gossip-based full membership) — params namespaced 'membership.'
# Bootstrap contact for when multicast discovery is unavailable:
#   none         → I am the first node (start immediately, don't wait)
#   host:port    → seed from this existing node
#   (commented)  → wait passively for multicast discovery to provide a contact
membership.contact=none
membership.sampletime 2000
membership.samplesize 6
# Set >0 to periodically log the membership view to the log file (diagnostics).
membership.metrics.interval -1
